# Migrated from .circleci/config.yml — faithful GitHub Actions translation of
# the two CircleCI jobs (build-and-test + quality). Runs on pushes to main and
# on every pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # Mirrors the CircleCI "Install Dependencies" step: install runtime +
        # test deps from requirements.txt, then numpy (which requirements.txt
        # omits — CircleCI pinned it separately).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy==2.3.0

      - name: Apply pypowsybl2grid patch (redundant fallback since M5)
        # The zero-value fix is now applied at package import time by
        # expert_op4grid_recommender/patched_backend.py (see CLAUDE.md gotcha #6),
        # so this in-file edit is a belt-and-suspenders redundancy — idempotent
        # and composes harmlessly with the runtime patch. Kept for one release;
        # safe to remove once the runtime patch has soaked.
        run: python scripts/patch_pypowsybl2grid_file.py --debug

      - name: Run unit tests (exclude slow)
        run: pytest -m "not slow"

  quality:
    name: Static analysis
    # Static analysis only (ruff / interrogate / radon parse the code, they do
    # not import it — no heavy runtime deps needed). The ruff gate covers the
    # whole repo via the ratchet baseline in pyproject.toml; interrogate and
    # radon stay scoped to the manoeuvre module.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install quality tools
        run: pip install ruff interrogate radon

      - name: Lint (ruff) — whole repo
        run: ruff check .

      - name: Docstrings (interrogate) — manoeuvre module
        run: interrogate expert_op4grid_recommender/manoeuvre

      - name: Complexity (radon, informational — non-blocking)
        # Indicative only, mirrors the CircleCI "non bloquant" step.
        continue-on-error: true
        run: radon cc expert_op4grid_recommender/manoeuvre -a -s
